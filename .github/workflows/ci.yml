name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      # Published ports match docker-compose.yml exactly - same infra
      # definition for local dev and CI (TESTING.md §3.1/§3.2).
      DATABASE_URL: postgresql+asyncpg://sift:sift@localhost:5432/sift
      QDRANT_URL: http://localhost:6333
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Start Postgres and Redis (docker compose, --wait for their healthchecks)
        run: docker compose up -d --wait postgres redis

      - name: Start Qdrant (docker compose; no healthcheck defined, so wait on the host side)
        run: |
          docker compose up -d qdrant
          timeout 60 bash -c 'until curl -sf http://localhost:6333/ >/dev/null; do sleep 2; done'

      - name: Run migrations
        run: alembic upgrade head

      - name: Test (pytest) - unit, functional, and integration (excludes live_llm)
        run: pytest

      - name: Live RAG tests (real OpenRouter + Voyage + Qdrant against the golden dataset)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: pytest -m live_llm tests/live -v
        # Skips cleanly (exit 0) rather than failing if the secrets above
        # aren't configured yet - see tests/live/test_golden_rag_live.py's
        # _require_live_vendor_keys fixture. Once both secrets are set on
        # the repo, this step makes real vendor calls and must pass for
        # real, per TESTING.md §7.9.

      - name: Tear down docker compose services
        if: always()
        # Scoped to just the services this workflow started - a bare
        # `docker compose down` resolves the whole compose file, including
        # `api`/`worker`, which declare `env_file: .env`; `.env` is
        # gitignored and doesn't exist on the runner, which fails config
        # resolution for services we never started in the first place.
        run: docker compose down -v postgres redis qdrant
